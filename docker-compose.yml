version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: framepulse
      POSTGRES_PASSWORD: framepulse123
      POSTGRES_DB: framepulse
    ports:
      - '5457:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U framepulse']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - '4017:4017'
    environment:
      DATABASE_URL: postgresql://framepulse:framepulse123@postgres:5432/framepulse?schema=public
      JWT_SECRET: framepulse-dev-secret
      FRONTEND_URL: http://localhost:3017
      PORT: 4017
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run deploy

  frontend:
    build: ./frontend
    ports:
      - '3017:3017'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4017/api
    depends_on:
      - backend
